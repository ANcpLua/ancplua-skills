# ═══════════════════════════════════════════════════════════════════════════════
# Claude Code Configuration Validation
# Validates .claude/ directory against Anthropic best practices
# ═══════════════════════════════════════════════════════════════════════════════

name: Validate Claude Code Config

on:
  push:
    branches: [ main, master ]
    paths:
      - '.claude/**'
      - 'CLAUDE.md'
      - '.github/workflows/validate-claude-config.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - '.claude/**'
      - 'CLAUDE.md'
  workflow_dispatch:

jobs:
  validate-claude-config:
    name: Validate Claude Code Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────────
      # Directory Structure
      # ─────────────────────────────────────────────────────────────────────────
      - name: Validate .claude/ structure
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "Validating Claude Code Directory Structure"
          echo "═══════════════════════════════════════════════════════════════"

          ERRORS=0

          # Required directory
          if [ ! -d ".claude" ]; then
            echo "❌ ERROR: .claude/ directory not found"
            exit 1
          fi
          echo "✅ .claude/ directory exists"

          # Required files
          if [ ! -f ".claude/settings.json" ]; then
            echo "❌ ERROR: .claude/settings.json not found"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ settings.json exists"
          fi

          if [ ! -f "CLAUDE.md" ]; then
            echo "⚠️  WARNING: CLAUDE.md not found (recommended)"
          else
            echo "✅ CLAUDE.md exists"
          fi

          # Optional directories
          [ -d ".claude/commands" ] && echo "✅ commands/ exists" || echo "ℹ️  commands/ not present"
          [ -d ".claude/agents" ] && echo "✅ agents/ exists" || echo "ℹ️  agents/ not present"
          [ -d ".claude/skills" ] && echo "✅ skills/ exists" || echo "ℹ️  skills/ not present"
          [ -d ".claude/scripts" ] && echo "✅ scripts/ exists" || echo "ℹ️  scripts/ not present"

          if [ $ERRORS -gt 0 ]; then
            echo "❌ FAILED: $ERRORS structure error(s)"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # JSON Validation
      # ─────────────────────────────────────────────────────────────────────────
      - name: Validate settings.json syntax
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "Validating JSON Syntax"
          echo "═══════════════════════════════════════════════════════════════"

          if ! python3 -m json.tool .claude/settings.json > /dev/null 2>&1; then
            echo "❌ ERROR: settings.json has invalid JSON syntax"
            python3 -m json.tool .claude/settings.json 2>&1 || true
            exit 1
          fi
          echo "✅ settings.json is valid JSON"

          # Check for MCP config
          if [ -f ".mcp.json" ]; then
            if ! python3 -m json.tool .mcp.json > /dev/null 2>&1; then
              echo "❌ ERROR: .mcp.json has invalid JSON syntax"
              exit 1
            fi
            echo "✅ .mcp.json is valid JSON"
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Settings Schema Validation
      # ─────────────────────────────────────────────────────────────────────────
      - name: Validate settings.json schema
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "Validating settings.json Schema"
          echo "═══════════════════════════════════════════════════════════════"

          python3 << 'EOF'
          import json
          import sys

          errors = []

          with open('.claude/settings.json', 'r') as f:
              settings = json.load(f)

          # Valid top-level keys
          VALID_KEYS = ['$schema', 'permissions', 'hooks', 'env', 'model', 'apiKey']

          for key in settings.keys():
              if key not in VALID_KEYS:
                  errors.append(f"Unknown top-level key: '{key}'")

          # Validate permissions
          if 'permissions' in settings:
              perms = settings['permissions']
              if 'allow' in perms and not isinstance(perms['allow'], list):
                  errors.append("permissions.allow must be an array")
              if 'deny' in perms and not isinstance(perms['deny'], list):
                  errors.append("permissions.deny must be an array")
              print("✅ permissions structure valid")

          # Validate hooks
          if 'hooks' in settings:
              VALID_HOOKS = ['PreToolUse', 'PostToolUse', 'SessionStart', 'Stop', 'Notification']
              hooks = settings['hooks']
              for hook_name in hooks.keys():
                  if hook_name not in VALID_HOOKS:
                      errors.append(f"Unknown hook type: '{hook_name}'")
                  else:
                      # Each hook should be an array
                      if not isinstance(hooks[hook_name], list):
                          errors.append(f"hooks.{hook_name} must be an array")
              print("✅ hooks structure valid")

          # Validate env
          if 'env' in settings:
              if not isinstance(settings['env'], dict):
                  errors.append("env must be an object")
              else:
                  print("✅ env structure valid")

          if errors:
              print()
              print("❌ Schema validation errors:")
              for error in errors:
                  print(f"   - {error}")
              sys.exit(1)

          print()
          print("✅ settings.json schema is valid")
          EOF

      # ─────────────────────────────────────────────────────────────────────────
      # Command Files Validation
      # ─────────────────────────────────────────────────────────────────────────
      - name: Validate slash commands
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "Validating Slash Commands"
          echo "═══════════════════════════════════════════════════════════════"

          if [ ! -d ".claude/commands" ]; then
            echo "ℹ️  No commands directory - skipping"
            exit 0
          fi

          ERRORS=0
          for cmd in .claude/commands/*.md; do
            if [ -f "$cmd" ]; then
              filename=$(basename "$cmd")

              # Check YAML frontmatter
              if ! head -1 "$cmd" | grep -q "^---$"; then
                echo "❌ ERROR: $filename missing YAML frontmatter"
                ERRORS=$((ERRORS + 1))
              else
                echo "✅ $filename has frontmatter"

                # Check required fields
                if ! grep -q "^description:" "$cmd"; then
                  echo "⚠️  WARNING: $filename missing 'description' field"
                fi
              fi
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ FAILED: $ERRORS command error(s)"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Agent Files Validation
      # ─────────────────────────────────────────────────────────────────────────
      - name: Validate subagents
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "Validating Subagents"
          echo "═══════════════════════════════════════════════════════════════"

          if [ ! -d ".claude/agents" ]; then
            echo "ℹ️  No agents directory - skipping"
            exit 0
          fi

          ERRORS=0
          for agent in .claude/agents/*.md; do
            if [ -f "$agent" ]; then
              filename=$(basename "$agent")

              # Check YAML frontmatter
              if ! head -1 "$agent" | grep -q "^---$"; then
                echo "❌ ERROR: $filename missing YAML frontmatter"
                ERRORS=$((ERRORS + 1))
              else
                echo "✅ $filename has frontmatter"

                # Check required fields
                if ! grep -q "^name:" "$agent"; then
                  echo "❌ ERROR: $filename missing 'name' field"
                  ERRORS=$((ERRORS + 1))
                fi
              fi
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ FAILED: $ERRORS agent error(s)"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Script Validation
      # ─────────────────────────────────────────────────────────────────────────
      - name: Validate scripts
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "Validating Scripts"
          echo "═══════════════════════════════════════════════════════════════"

          if [ ! -d ".claude/scripts" ]; then
            echo "ℹ️  No scripts directory - skipping"
            exit 0
          fi

          ERRORS=0
          for script in .claude/scripts/*.sh; do
            if [ -f "$script" ]; then
              filename=$(basename "$script")

              # Check shebang
              if ! head -1 "$script" | grep -qE "^#!.*(bash|sh)"; then
                echo "⚠️  WARNING: $filename missing shebang"
              fi

              # Syntax check
              if ! bash -n "$script" 2>/dev/null; then
                echo "❌ ERROR: $filename has syntax errors"
                ERRORS=$((ERRORS + 1))
              else
                echo "✅ $filename syntax valid"
              fi
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ FAILED: $ERRORS script error(s)"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Summary
      # ─────────────────────────────────────────────────────────────────────────
      - name: Validation Summary
        if: success()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "✅ CLAUDE CODE CONFIGURATION VALID"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "Validated:"
          echo "  ✅ Directory structure"
          echo "  ✅ JSON syntax"
          echo "  ✅ Settings schema"
          echo "  ✅ Slash commands"
          echo "  ✅ Subagents"
          echo "  ✅ Scripts"
          echo ""
          echo "Configuration follows Anthropic Claude Code best practices!"
