# ═══════════════════════════════════════════════════════════════════════════════
# Changelog Enforcer Workflow
# Ensures CHANGELOG.md is updated in every pull request
# ═══════════════════════════════════════════════════════════════════════════════
# This workflow enforces that contributors document their changes.
# Claude Code agents MUST update CHANGELOG.md before creating PRs.
# ═══════════════════════════════════════════════════════════════════════════════

name: Changelog Enforcer

on:
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened, edited ]

jobs:
  enforce-changelog:
    name: Enforce Changelog Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if CHANGELOG.md was modified
        id: changelog-check
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "Checking if CHANGELOG.md was updated in this PR"
          echo "═══════════════════════════════════════════════════════════════"

          # Get the list of changed files in this PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files in this PR:"
          echo "$CHANGED_FILES"
          echo ""

          if echo "$CHANGED_FILES" | grep -q "^CHANGELOG.md$"; then
            echo "✅ CHANGELOG.md was updated"
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "❌ CHANGELOG.md was NOT updated"
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify changelog has new entries
        if: steps.changelog-check.outputs.updated == 'true'
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "Verifying CHANGELOG.md has meaningful updates"
          echo "═══════════════════════════════════════════════════════════════"

          # Check that Unreleased section has content
          if grep -A 50 "## \[Unreleased\]" CHANGELOG.md | grep -E "^### (Added|Changed|Deprecated|Removed|Fixed|Security)$" > /dev/null; then
            echo "✅ CHANGELOG.md has proper section headers"
          else
            echo "⚠️  Warning: CHANGELOG.md may be missing section headers"
          fi

          # Check for actual entries (lines starting with -)
          UNRELEASED_CONTENT=$(sed -n '/## \[Unreleased\]/,/## \[/p' CHANGELOG.md | grep -E "^- " | head -5)
          if [ -n "$UNRELEASED_CONTENT" ]; then
            echo "✅ Found changelog entries:"
            echo "$UNRELEASED_CONTENT"
          else
            echo "⚠️  Warning: No bullet point entries found in Unreleased section"
          fi

      - name: Fail if changelog not updated
        if: steps.changelog-check.outputs.updated == 'false'
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "❌ CHANGELOG.md MUST be updated in every pull request!"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "Please update CHANGELOG.md with your changes:"
          echo ""
          echo "1. Add entries under the [Unreleased] section"
          echo "2. Use appropriate categories:"
          echo "   - Added: New features"
          echo "   - Changed: Changes in existing functionality"
          echo "   - Deprecated: Soon-to-be removed features"
          echo "   - Removed: Removed features"
          echo "   - Fixed: Bug fixes"
          echo "   - Security: Vulnerability fixes"
          echo ""
          echo "3. Format: '- Description of change (#PR_NUMBER)'"
          echo ""
          echo "Example:"
          echo "  ### Added"
          echo "  - New skill for TypeScript type inference (#42)"
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          exit 1

      - name: Success message
        if: steps.changelog-check.outputs.updated == 'true'
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "✅ CHANGELOG.md check passed!"
          echo "═══════════════════════════════════════════════════════════════"
