# ═══════════════════════════════════════════════════════════════════════════════
# Build Workflow
# Builds and tests the .NET project using Nuke
# ═══════════════════════════════════════════════════════════════════════════════

name: Build

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: ./build.sh Compile --skip

      - name: Generate SKILLS.md
        run: ./build.sh GenerateSkills

      - name: Validate Skills
        run: ./build.sh ValidateSkills

      - name: Verify SKILLS.md is up to date
        run: |
          if git diff --exit-code SKILLS.md; then
            echo "✅ SKILLS.md is up to date"
          else
            echo "❌ SKILLS.md is out of date. Run './build.sh GenerateSkills' locally and commit."
            exit 1
          fi

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ancplua/ancplua-skills:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
