# ═══════════════════════════════════════════════════════════════════════════════
# Build Workflow
# Builds and tests the .NET project using Nuke
# ═══════════════════════════════════════════════════════════════════════════════

name: Build

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Cache NuGet packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: ./build.sh Compile --skip

      - name: Generate SKILLS.md
        run: ./build.sh GenerateSkills

      - name: Validate Skills
        run: ./build.sh ValidateSkills

      - name: Verify SKILLS.md structure is up to date
        run: |
          # Compare SKILLS.md ignoring the timestamp line (last line)
          # Remove timestamp from both versions before comparing
          head -n -1 SKILLS.md > /tmp/skills-new.md
          git show HEAD:SKILLS.md | head -n -1 > /tmp/skills-old.md

          if diff -q /tmp/skills-old.md /tmp/skills-new.md > /dev/null 2>&1; then
            echo "✅ SKILLS.md structure is up to date (timestamp ignored)"
          else
            echo "❌ SKILLS.md has structural changes."
            echo "Run './build.sh GenerateSkills' locally and commit."
            diff /tmp/skills-old.md /tmp/skills-new.md || true
            exit 1
          fi

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ancplua/ancplua-skills:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
