# ═══════════════════════════════════════════════════════════════════════════════
# Docker Hub Publish Workflow
# Builds and publishes Docker images to Docker Hub
# ═══════════════════════════════════════════════════════════════════════════════
# CURRENTLY DISABLED - Set workflow_dispatch to enable manual runs
# To enable: Remove 'if: false' from the build job
# ═══════════════════════════════════════════════════════════════════════════════

name: Docker Publish

on:
  # Manual trigger only while disabled
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: false
        default: 'latest'

  # Uncomment to enable on push to main
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 'ancplua-skills/**'
  #     - 'Dockerfile'
  #     - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ancplua/ancplua-skills

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    # ═══════════════════════════════════════════════════════════════════════════
    # DISABLED: Set to 'true' to enable this workflow
    # ═══════════════════════════════════════════════════════════════════════════
    if: false

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ancplua
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./ancplua-skills/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo "Pushed image digest ${{ steps.build.outputs.digest }}"
