# ═══════════════════════════════════════════════════════════════════════════════
# Docker Hub Publish Workflow
# Builds and publishes Docker images to Docker Hub
# ═══════════════════════════════════════════════════════════════════════════════
# CURRENTLY DISABLED - Set workflow_dispatch to enable manual runs
# To enable: Remove 'if: false' from the build job
# ═══════════════════════════════════════════════════════════════════════════════

name: Docker Publish

on:
  # Manual trigger only while disabled
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: false
        default: 'latest'

  # Uncomment to enable on push to main
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 'ancplua-skills/**'
  #     - 'Dockerfile'
  #     - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ancplua/ancplua-skills

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    # ═══════════════════════════════════════════════════════════════════════════
    # DISABLED: Set to 'true' to enable this workflow
    # ═══════════════════════════════════════════════════════════════════════════
    if: false

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ancplua
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./ancplua-skills/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo "Pushed image digest ${{ steps.build.outputs.digest }}"
