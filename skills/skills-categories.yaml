# Skills Category Definitions

categories:
  - id: documentation-grounding
    name: "Documentation Grounding"
    prefix: docs
    icon: "D"
    scope: global
    description: |
      > Skills that route work toward authoritative documentation, source, and freshness checks before answering from memory.
    order: 1
    subcategories:
      - id: microsoft
        name: "Microsoft"

  - id: model-context-protocol
    name: "Model Context Protocol"
    prefix: mcp
    icon: "M"
    scope: domain
    description: |
      > Skills for MCP SDKs, protocol behavior, transports, tools, resources, prompts, and client/server correctness.
    order: 10
    subcategories:
      - id: dotnet
        name: ".NET"

  - id: source-control
    name: "Source Control Platforms"
    prefix: scm
    icon: "S"
    scope: domain
    description: |
      > Skills for direct forge/repository APIs, pull requests, review workflows, CI runners, releases, and packages.
    order: 11

  - id: frontend
    name: "Frontend UI"
    prefix: ui
    icon: "F"
    scope: domain
    description: |
      > Skills for UI libraries, component registries, page sections, and frontend integration workflows.
    order: 12
    subcategories:
      - id: react
        name: "React"

  - id: architecture-diagramming
    name: "Architecture Diagramming"
    prefix: arch
    icon: "A"
    scope: domain
    description: |
      > Skills for generating architecture diagrams, C4 views, and editable diagram artifacts.
    order: 13

  - id: review-quality
    name: "Review & Quality"
    prefix: review
    icon: "Q"
    scope: session
    description: |
      > On-demand skills for code review, maintainability audits, and implementation-quality judgement.
    order: 20
